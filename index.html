<script type="text/babel" data-type="module">
const { useState, useEffect } = React;

function MasteryGuide() {
  const [activeWeek, setActiveWeek] = useState(0);
  const [completed, setCompleted] = useState({});
  const [notes, setNotes] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState('overview'); // overview | program | manual

  // Load persisted state from localStorage
  useEffect(() => {
    try {
      const c = localStorage.getItem('mastery:completed');
      if (c) setCompleted(JSON.parse(c));
    } catch (e) {}
    try {
      const n = localStorage.getItem('mastery:notes');
      if (n) setNotes(JSON.parse(n));
    } catch (e) {}
    setLoaded(true);
  }, []);

  const saveCompleted = (next) => {
    setCompleted(next);
    try { localStorage.setItem('mastery:completed', JSON.stringify(next)); } catch (e) {}
  };

  const saveNotes = (next) => {
    setNotes(next);
    try { localStorage.setItem('mastery:notes', JSON.stringify(next)); } catch (e) {}
  };

  const toggleTask = (weekIdx, taskIdx) => {
    const key = `${weekIdx}-${taskIdx}`;
    const next = { ...completed, [key]: !completed[key] };
    saveCompleted(next);
  };

  const program = [
    {
      week: 1,
      title: 'The Ground',
      epigraph: '"It is not what happens to you, but how you react to it that matters." — Epictetus',
      principle: 'Before you can do the work of mastery, you must become a man who can do the work. The rest of this program asks you to examine your life honestly, submit to apprenticeship, ship work that may fail, and absorb criticism without collapse. None of that is possible from a mind that hijacks itself the moment things get hard. This first week is therefore not about goals. It is about building the internal capacity — the steady ground — on which everything else stands. Two traditions point to the same ground from different sides: the Stoics from the philosophical side, with the inner citadel and daily self-examination; Shirzad Chamine\'s Positive Intelligence framework from the neuroscientific side, with the Saboteurs and Sage. Together they describe one practice: notice the inner alarm, refuse to obey it without examination, choose a response rather than be commanded by one.',
      greene: 'Every master Greene profiles shares one trait beneath the surface: they could stay with discomfort longer than other people. Faraday could clean bottles for years without becoming bitter. Bill Bradley could practice the same dribble move for ten thousand reps without losing focus. This is not stoic posturing; it is a trained nervous system. The men who quit at every stage of the apprenticeship do so because their internal alarm system fires at things that are not actually emergencies — a moment of boredom, a piece of criticism, a flicker of self-doubt — and they obey the alarm. Mastery requires learning, before anything else, to not obey it.',
      stoic: 'The Stoic tradition has a two-thousand-year-old technology for this. Marcus Aurelius rose each morning and reminded himself of the day\'s likely difficulties — the ungrateful, the arrogant, the dishonest — so that when they arrived he was not surprised by them. Seneca examined each evening: "What bad habit have I cured today? What fault have I resisted? In what respect am I better?" Epictetus taught that no event itself disturbs us — only our judgment of it. The inner citadel is the unconquered place in you that no one reaches without your permission. Chamine\'s Positive Intelligence framework gives this ancient idea a modern operating system. The negative voices that hijack you come from ten patterns called Saboteurs, with the Judge as the master Saboteur. The positive responses come from the Sage. The work is mechanical: catch the Saboteur, weaken it by naming it, perform a PQ Rep — ten seconds of full attention to a physical sensation — and choose a Sage response. Neuroscience confirms what the Stoics intuited: this is a trainable capacity, built by repetition, that compounds over a lifetime.',
      tasks: [
        'Take Chamine\'s free Saboteur Assessment at positiveintelligence.com. Identify your top two Saboteurs — the inner voices most likely to derail you. The Judge will be one of them; that is universal. Write down when and how they tend to show up.',
        'Build a daily PQ Rep practice through habit stacking: attach one 10-second present-moment attention exercise to each existing morning routine activity — brushing teeth, making coffee, the first sip of water. Total daily commitment: under one minute. The rule is "Sage before Saboteur" — do it before checking your phone.',
        'Begin a Stoic daily examen: a brief written review each evening for the full week. Three questions, as Seneca practiced them — What did I do badly today? What did I do well? What will I do differently tomorrow? Five minutes, no more. The point is not perfection. The point is to make your own life visible to yourself before another week passes without examination.',
        'Practice the "Catch the Judge" move this week. When the Judge fires — "you are not good enough," "they are the problem," "this is a disaster" — name it: "That is the Judge." Then briefly celebrate the catch. The celebration releases dopamine and reinforces the habit. Fake it if you have to. The Judge will resist being celebrated, which is exactly why you do it.',
      ],
      reflection: 'Which Saboteur has been running my life under the name of "just how I am"?',
    },
    {
      week: 2,
      title: 'The Calling',
      epigraph: '"The future belongs to those who learn several skills and combine them in creative ways." — Robert Greene',
      principle: 'Before you can master anything, you must know what to master — but the search is more complicated than it sounds. Greene says trace your primal inclinations. Newport says passion follows mastery, not the other way around. Both are right, and the contradiction is the point: you need enough early signal to choose a direction, and enough humility to know the love comes later, after the skill does.',
      greene: 'Greene locates evidence of your Life\'s Task in primal inclinations — what you were drawn to between ages six and fourteen, before social comparison hijacked you. Einstein was given a compass at five and chased that question his whole life. V. S. Ramachandran, who became one of the most original neuroscientists of his generation, collected weird seashells as a boy and lingered in museums in front of jars of human birth defects — drawn to the outliers, the strange, the abnormal. That childhood pattern became the adult career. Paul Graham found his work partly by cataloguing what he hated — bureaucracy, sales, academia — and inverting it. Greene\'s claim is not that you should chase a forgotten passion; it is that the evidence of who you are is already in the record, written in what you returned to as a child without being told to. The fire goes out, but the embers remain.',
      stoic: 'David Epstein\'s research in Range argues that most high performers in complex fields are not early specialists but late samplers — Roger Federer played every sport before tennis, Frances Hesselbein wandered for decades before leading the Girl Scouts. Epstein\'s sharper point: in complex domains the data shows early specialists actually fall behind generalists. The anxiety you feel about not having "picked a lane" is the wrong anxiety. Cal Newport pushes from a different angle: "follow your passion" is bad advice if it makes you wait for certainty before doing the work. Resolve the tension this way — Greene gives you the direction; Newport gives you the means. You use primal inclinations to choose where to apprentice, then you trust that the deeper engagement, the real love, will arrive through the work itself. The Stoic move is to act before you feel ready and let the doing teach you who you are.',
      tasks: [
        'Write down five things you were obsessed with between ages 6 and 14. Look for the ones still tugging at you when you scroll today.',
        'List three things you genuinely hate about how your field operates — the bureaucracy, the BS, the work you refuse. Paul Graham found his calling by tracing what he hated. The inverse points to what you love.',
        'Identify one ambition you currently hold that you suspect is borrowed from a parent, a peer, or an algorithm. Name the source. Hold it up to the light.',
        'Define your decade-long domain in one sentence — but do not over-narrow it. Greene rejects the pure hedgehog; Range backs him with data. Aim for two or three skills you can eventually combine into something only you could make.',
      ],
      reflection: 'What did I do at twelve, without supervision, that I still recognize in myself?',
    },
    {
      week: 3,
      title: 'Submit to Reality',
      epigraph: '"It is impossible for a man to learn what he thinks he already knows." — Epictetus',
      principle: 'You enter the work world naive, ignorant, and full of ideas that have not been tested. This is not a mark against you — it is simply the truth. The fastest way out of it is to shut your ego down and start observing. The goal is not to perform competence you have not earned. It is to build what Cal Newport calls career capital — rare and valuable skills — and what Meg Jay calls the broader identity capital: the accumulated skills, credentials, experiences, scars, and reference points that become the currency of every later decade. The job that pays well but teaches nothing is a worse trade than the job that pays half and builds the platform. The 26-year-old who chooses identity capital over comfort is not delaying his life. He is funding it.',
      greene: 'Greene\'s apprenticeship has three distinct phases. Deep observation: absorb the rules, the politics, the unwritten code of the room. Skill acquisition: practice the fundamentals until your body knows them without your mind. Experimentation: test what you have learned against reality and let reality correct you. Most men skip phase one and stall in phase two. Greene gives a specific piece of unfashionable advice: in your twenties, take the lower-paying job that puts you closer to skilled work and skilled people. The high-paying job that does not build skills locks you into a paycheck-dependency from which most never recover. Michael Faraday, son of a blacksmith, taught himself science as a bookbinder\'s apprentice — building his own encyclopedia, attending lectures, copying them out by hand until they were engraved in his brain. He earned his way into Humphry Davy\'s laboratory by demonstrating he was already disciplined before anyone asked him to be. Meg Jay\'s research adds the warning: men who skip the apprenticeship years — the underemployed, the perpetually-finding-themselves, the still-deciding — find at 35 that they have no capital to spend and no leverage to negotiate with. The twenties are when this account gets opened, or doesn\'t.',
      stoic: 'When Faraday finally got the apprenticeship, his first months were spent cleaning bottles and sweeping the lab. He observed for two hours, scrubbed for four. The Stoic accepts this without resentment. Epictetus himself was a slave before he was a philosopher. The work that builds a man is rarely the work that flatters him. This is also where the Judge Saboteur from Week 1 will scream loudest: "you are better than this," "this is beneath you," "your friends are ahead of you." Chamine\'s key move here is the distinction between Sage Discernment and Judge Judgment — both can see the same fact, but only the Judge wraps it in emotional charge. Discernment: "this task is unglamorous." Judgment: "I am unworthy because I am doing it." The first is information you can use. The second is a Saboteur masquerading as a moral compass. Name it. Do the work anyway.',
      tasks: [
        'Identify the person 10–15 years ahead of you in your craft. Study not their highlight reel but how they spent their twenties — the unglamorous work that built the platform.',
        'Audit your identity capital. Make four columns: skills, credentials, experiences, reference points (people who would vouch for you, places you have worked, scars you have learned from). What do you actually have? What is one piece you most need to add in the next two years — and what is the unglamorous work that adds it?',
        'Find your weakest fundamental skill in your craft. Schedule four hours this week practicing only that. Bill Bradley wore glasses that blocked the basketball so he had to dribble blind. Pick your equivalent.',
        'Stop performing expertise on social media for one full week. Notice what that withdrawal feels like. The ego signal is the lesson.',
      ],
      reflection: 'Where am I performing competence I have not yet earned, and what is that costing me in actual capital?',
    },
    {
      week: 4,
      title: 'Time and the Long Horizon',
      epigraph: '"You could leave life right now. Let that determine what you do and say and think." — Marcus Aurelius',
      principle: 'Mastery requires a paradoxical relationship with time and money: act as if you have decades, and as if you might die Friday. One gives you patience. The other gives you urgency. And learn now to live on little, because fear of losing income is what traps men in work that is killing them.',
      greene: 'Greene is explicit: learn in your twenties what it is to live on five dollars a day, because if you are addicted to a paycheck at 24, you will be addicted to one at 44. The man who knows he can survive lean has a structural advantage — he can take the unpaid apprenticeship, the risky venture, the year of building. He is not afraid. Fear is the worst element in any entrepreneur or craftsman.',
      stoic: 'William Irvine\'s update to Stoicism is the reframe technique: when something unwanted happens — a setback, a lean stretch, a missed promotion — treat it as a test designed specifically to measure your character. Not a metaphysical claim, a psychological tool. The man who reframes scarcity as training behaves entirely differently from the man who experiences it as catastrophe. Chamine\'s parallel framing is the Sage Perspective: every circumstance can be converted into a gift or opportunity. The Stoic and the PQ practitioner say the same thing in different vocabulary. The 10-second move is "Accept or Convert" — Accept it with peace, or Convert it into a gift. Either is a Sage response. The third option, continuing to feel bad about it, is the Judge stealing the rest of your day. Seneca\'s ancient version is the same: practice voluntary poverty regularly, eat coarse bread, wear rough clothes, not as theater but to discover the things you feared losing were never worth being controlled by.',
      tasks: [
        'Calculate your remaining productive weeks (assume age 75). Write the number where you will see it daily.',
        'Audit last week\'s hours. How many went to deep work on your craft? How many to consumption? Be honest enough to be uncomfortable.',
        'Practice one week of voluntary frugality: cook every meal, no purchases beyond essentials, no rideshares. When friction shows up — and it will — apply Irvine\'s reframe: this is a test, not a punishment.',
        'Set a ten-year vision in writing. One paragraph. Date it. Seal it in a file you will open in 2036.',
      ],
      reflection: 'What would I attempt if I knew I could survive on half my current income?',
    },
    {
      week: 5,
      title: 'Resistance Practice',
      epigraph: '"First say to yourself what you would be; then do what you have to do." — Epictetus',
      principle: 'You will not improve by practicing what you are already good at. The mechanism of mastery is the opposite — you train deliberately on what resists you, on what exposes your weakness, on the parts you would rather skip. This is the work that builds the thing that looks, from outside, like talent.',
      greene: 'Greene calls this resistance practice. Bill Bradley, a slow and uncoordinated kid who loved basketball, designed an obsessional practice schedule attacking every weakness he had. He wore glasses that blocked the basketball so he had to dribble without looking. He practiced pivot moves alone in his bedroom. On family cruises he dribbled up and down the narrow ship corridors. People who later watched him play assumed he was naturally gifted. He was not. He had spent ten thousand hours on what hurt. Greene\'s own method is the same: a notecard system, twenty to thirty cards per book, color-coded by subject — a deliberate, almost obsessive infrastructure for thinking. He looks insane to outsiders. He produces work no one else can.',
      stoic: 'Musonius Rufus taught that the body must be trained because the soul uses the body in every act of virtue. A man who cannot make himself sit with difficulty for two hours cannot make himself sit with anything difficult. Discipline is one substance; it leaks across every domain. This is also where the Avoider and the Restless Saboteurs do their most damage — "just check the phone for a second," "you can practice tomorrow," "this is boring, switch to something easier." Treat the urge to flee the work as data, not as command. A ten-second PQ Rep — full attention to a physical sensation in front of you — is enough to break the Saboteur grip and return you to the work. (In Chamine\'s vocabulary, what you are building here is the Sage Power of Activate: laser-focused action without Saboteur interference.)',
      tasks: [
        'Build a deliberate practice ritual: same time daily, same place, on the weakest fundamental of your craft. Two hours minimum, four days minimum, no exceptions for mood.',
        'Build your own version of Greene\'s notecard system. Choose your input medium (notebook, app, index cards) and start capturing — themes, patterns, quotes — from everything you read or watch this week.',
        'Choose one form of physical training. Three sessions minimum this week. Track every session. The body teaches the mind what discipline feels like.',
        'Practice one voluntary discomfort this week: cold exposure, a 24-hour fast, a long walk with no phone. Build the muscle of choosing what is hard.',
      ],
      reflection: 'What am I outsourcing to motivation that I should be giving to structure?',
    },
    {
      week: 6,
      title: 'Mentors and Allies',
      epigraph: '"You have power over your mind — not outside events. Realize this, and you will find strength." — Marcus Aurelius',
      principle: 'Mastery is mostly solitary, but the conditions for it are built among other people. Two relationships will shape your craft more than any other in your twenties: the mentor who accelerates you, and the weak ties who open doors you cannot find alone. Both are usually under-thought by men your age. Both reward deliberate cultivation. Neither happens by drift.',
      greene: 'Mentors do not help out of altruism. Greene is blunt: mentor relationships are mutual self-interest, and the apprentice who imagines otherwise will not get one. You earn a mentor by offering something — competence, coverage of their weakness (often something digital and current that they cannot do), patience with menial work — and by demonstrating you can take criticism without taking it personally. Greene\'s own apprentice, Ryan Holiday, got the job because he was serious, he could fix a Wikipedia page Greene could not, and he did not flinch when corrected. The trade is real. Greene gets digital coverage, organizational help, work he doesn\'t want to do. Holiday gets writing instruction, professional connections, a future. If the trade is one-sided in either direction, the relationship will not last.',
      stoic: 'Benjamin Franklin, young and self-righteous in a London print shop, refused to contribute to the workers\' beer fund — they shouldn\'t drink, his money shouldn\'t fund it, the logic was airtight. Within weeks, mysterious proofreading errors began appearing in his work. He was nearly fired before he understood: he was not there to reform the culture; he was there to learn it. The Stoic inner citadel does not mean rigid righteousness; it means accepting reality as it is, including the irrational politics of every room. Meg Jay adds the structural argument that the relationships shaping your twenties are not just the close ones. Drawing on Mark Granovetter\'s research, she points out that most job opportunities, most introductions to new worlds, and most career-defining breaks come from weak ties — acquaintances, former colleagues, people you met once. Your close friends know what you know. The weak ties know what you don\'t. Twentysomethings systematically over-invest in the inner circle and under-invest in the periphery, then wonder why no opportunities arrive.',
      tasks: [
        'Identify one potential mentor 10–15 years ahead of you. Before you reach out, find what you can specifically offer them — a skill they lack, a tedious task done well, coverage of a digital weakness. Approach with the offer, not with your ambition.',
        'List ten weak ties — acquaintances, former colleagues, people you met once at a conference, friends of friends — who know things you do not. Pick three and reach out this week with a specific question or genuine update. Not networking; contact with substance.',
        'Identify one "beer fund" moment from your last month — a time you stood on principle and missed the actual game being played. Write down what was really being asked of you.',
        'Practice strategic silence in one conversation this week: listen completely, contribute only what is essential. Notice what you learn that you would have missed while talking.',
      ],
      reflection: 'Whose approval am I still optimizing for, and is it costing me my actual work?',
    },
    {
      week: 7,
      title: 'The Partner Question',
      epigraph: '"Associate with those who will make a better man of you. Welcome those whom you yourself can improve." — Seneca, Letters from a Stoic',
      principle: 'The work weeks of this program are flattering. They are about becoming a master, finding your craft, building your capital. This week is harder because it is less flattering: the partner you choose by 30 may matter more than the job you choose, and most men under-think it severely. They marry whoever they happened to be dating at 28. Then they spend their thirties either compounding with that person or being slowly undermined by them. The choice is decade-defining. It deserves a decade-defining level of attention.',
      greene: 'Greene does not write directly about romantic partnership in Mastery, but his framework applies cleanly. Just as you would not apprentice yourself to a mentor whose values you do not share, you should not bind your decade to a partner whose direction is incompatible with yours. The same questions Greene asks about a craft — what does this require of me, who do I become through this, where does this path lead in twenty years — apply here. A partner is not the same as a craft; she is her own person with her own life. But she is also the single most influential environment your craft will exist within. Drift on this decision and you risk the rest.',
      stoic: 'Meg Jay\'s clinical research on twentysomethings repeatedly returns to the partner question because it is the one her patients most regret getting wrong. The cohabitation effect — that couples who move in together without explicit commitment are more likely to slide into marriages they would not have chosen deliberately — is one of the most replicated findings in her field. The Stoic move is to apply the same clear-eyed examination to this decision that you would apply to a business partnership, a career change, or a major investment. This does not mean treating it transactionally. It means refusing to let inertia decide it. The Sage Discernment of Week 3 is the right tool — facts without emotional charge, then a deliberate choice. "I love being around her" is a feeling. "We are building toward the same kind of life" is discernment. (Chamine names the underlying Sage capacity Empathize — the ability to see another person, and yourself in relation to them, with appreciation rather than judgment. Useful here.)',
      tasks: [
        'Write, honestly, what you actually want your life to look like at 40 — work, family, location, daily texture. Not what is impressive. What you want. Do not edit for realism yet.',
        'If you are currently partnered: spend an hour writing whether you are building toward that life together, or just sharing rent and routine. Is she walking in your direction, or are you slowing to match hers? Is that a trade you would consciously choose? Be honest with yourself before being honest with her.',
        'If you are not currently partnered: name the qualities that actually matter for the life you described — not what you find attractive in the moment, but what compounds over decades. Then look at where and how you are currently spending your social time. Is it likely to introduce you to someone like that? If not, what would?',
        'Either way: identify one inherited assumption about partnership you have not examined — about timeline, traditional roles, what marriage is for, what your parents modeled, what your peers are doing. Hold it up to the light. Decide if you actually believe it.',
      ],
      reflection: 'Am I making this decision, or letting it be made for me?',
    },
    {
      week: 8,
      title: 'Failure as Information',
      epigraph: '"The impediment to action advances action. What stands in the way becomes the way." — Marcus Aurelius',
      principle: 'You are going to fail repeatedly between now and your mid-thirties. The men who become masters are not the ones who fail less — they are the ones who extract more from each failure and recover their nerve faster.',
      greene: 'Greene calls it "fingertip feel" — the calibration that comes only from repeated contact with reality. Theory will not give it to you. Books will not give it to you. Only shipped work, public attempts, and survived failures will. You earn it the way Faraday earned his lab — through years of small, unrewarded competence accumulating into something undeniable. Cal Newport sharpens the point for modern work: the deep work you produce in private is only career capital once it has been shipped into the world and met a reader, a user, a customer. The hidden file on your hard drive is not capital. The thing you released, however imperfectly, is.',
      stoic: 'This is where William Irvine\'s reframe technique does its hardest work — and where the Judge Saboteur from Week 1 will be most active. When something goes wrong — a project flops, a person rejects you, a piece of public work gets torn apart — the Judge immediately writes a story: you are not good enough, you should have known, this proves what you secretly feared. Irvine\'s move is to interrupt that story before it sets, and frame the event as a test designed to measure exactly the trait you most need to develop. Combined with the PQ practice of naming the Judge and running a brief rep to return to present-moment attention, you arrive at a workable response: this is information, not identity. Failure becomes data, not a verdict.',
      tasks: [
        'Ship one piece of work publicly this week — imperfect, exposed, named. Do not optimize past 80 percent. The point is the contact with reality, not the polish.',
        'After it lands, write a one-page post-mortem. What was correct? What was naive? What is the next experiment?',
        'Identify one recent failure or rejection. Apply Irvine\'s reframe in writing: what trait was this designed to develop in me, and how would the man who passed the test have responded?',
        'Sit with one criticism you received recently. Steelman it. Take what is true. Discard the rest without resentment.',
      ],
      reflection: 'What am I avoiding because failure would be visible, and what is that avoidance costing me?',
    },
    {
      week: 9,
      title: 'Combination and Originality',
      epigraph: '"All that exists is the seed of what shall emerge from it." — Marcus Aurelius',
      principle: 'After enough apprenticeship, the rules become visible — and so do the gaps in them. Originality is not invention from nothing. It is the intelligent combination of fields you have absorbed deeply enough to recombine. This is where your decade of work starts to look, from outside, like genius.',
      greene: 'Greene\'s favorite example is Yoki Matsuoka: electrical engineering, then robotics, then artificial intelligence, then neuroscience. Four fields, each mastered, then combined to design a prosthetic hand that connects to the human brain. No one else could have built it because no one else had that exact stack. V. S. Ramachandran did the opposite — he narrowed, from medicine to optics to visual psychology to brain disorders, each step closer to the niche only he could occupy. Both paths work.',
      stoic: 'David Epstein\'s Range provides the empirical case Greene gestures at — and pushes further than Greene himself goes. The conventional wisdom that you should pick a lane at 22 and specialize early is not just wrong; in complex domains, the data shows early specialists actively fall behind generalists. Roger Federer played dozens of sports before tennis. Frances Hesselbein wandered for decades before leading the Girl Scouts. The pattern repeats across science, art, business, and military leadership. If you are currently anxious about not having committed to one thing, the research is on your side. Epstein\'s key distinction is between "kind" learning environments — chess, classical music, golf — where rules are stable, feedback is immediate, and early specialization wins; and "wicked" environments — most knowledge work, most creative work, most leadership — where rules shift, feedback is delayed, and breadth wins. The advice to specialize early is correct for chess players. It is the wrong advice for almost everyone else. Combine deliberately. The future belongs to the man with five real skills and the imagination to fuse them.',
      tasks: [
        'List the three to six skills or fields you have meaningfully invested in. Now ask: which two or three has no one else combined? That intersection is your opening.',
        'Identify one rule in your field that everyone follows. Ask why. If the answer is weak or merely habitual, you may have found something to violate intelligently.',
        'Start one project this week that no one asked for, has no audience, and you cannot justify economically. This is where your real voice lives.',
        'Keep a daily idea log for the full week — anything that snags your attention, no filter. Review it Sunday for patterns. The patterns are signal.',
      ],
      reflection: 'Where am I still imitating when I could be combining?',
    },
    {
      week: 10,
      title: 'The Cycle of Accelerated Returns',
      epigraph: '"Waste no more time arguing about what a good man should be. Be one." — Marcus Aurelius',
      principle: 'You will not feel like a master after ten weeks. You will not feel like one after ten years. Mastery is not a destination; it is a direction — and the practice itself becomes the reward. The men who quit do so because they expected practice to feel like drudgery forever. It does not.',
      greene: 'Greene calls it the cycle of accelerated returns. You practice something. You get better. Better is more fun. More fun means you practice harder. Harder practice produces faster improvement. The cycle compounds. Bill Bradley did not find dribbling tedious after a month — he found it electrifying, because he could now do something he could not do before. The mistake is to confuse the first weeks of practice with what practice eventually feels like. Push through that window, and the work itself becomes the life worth living.',
      stoic: 'Marcus Aurelius, in his last years as emperor, wrote to himself: "You have endured countless troubles through not being content with your reason doing the work it was made for." The work of becoming who you are. That work has no terminus, and that is the gift. The Stoic does not finish; he keeps walking, with progressively better company — his own. In the PQ vocabulary, the goal across ten weeks has been to spend more of your life in the Sage state and less in the grip of the Saboteurs. You will not eliminate the Judge or the Avoider — they were laid down too early for that. But you can name them faster, recover quicker, and choose differently more often. Each year, a higher percentage of your hours operate from the Sage. That is what mastery actually looks like from the inside.',
      tasks: [
